<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>tnxbd.top · aesthetic fluidity</title>
  <!-- ultra-lightweight: Inter font + minimal style -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    /* reset & base — 100/100 performance mindset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0f0c1f 0%, #2a1b3c 40%, #4a2c5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow-x: hidden;
    }

    /* canvas (3d blob) sits behind everything */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none; /* so buttons stay clickable */
    }

    /* main content layer */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 700px;
      padding: 1.5rem;
      margin: 1rem;
      pointer-events: none; /* children can override */
    }

    /* glassmorphic card — deep blur + soft border */
    .glass-card {
      background: rgba(20, 15, 35, 0.3);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      padding: 3rem 2rem;
      text-align: center;
      pointer-events: auto;
      transition: transform 0.4s ease;
    }

    /* elegant entrance fade + slide (css-only) */
    .glass-card > * {
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    .glass-card h1 { animation-delay: 0.1s; }
    .glass-card .subtitle { animation-delay: 0.2s; }
    .glass-card .button-wrapper { animation-delay: 0.35s; }
    .glass-card .meta-footer { animation-delay: 0.5s; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-weight: 400;
      font-size: clamp(2.2rem, 10vw, 4rem);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      background: linear-gradient(130deg, #ffffff 0%, #d6c6f0 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(180, 130, 255, 0.3);
    }

    .subtitle {
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 4px;
      word-spacing: 6px;
      margin-bottom: 2.8rem;
      color: rgba(255, 245, 255, 0.7);
    }

    /* button container + states */
    .button-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin: 2.2rem 0 1.8rem;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      padding: 1rem 2.8rem;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 6px;
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 0 20px rgba(210, 150, 255, 0.3);
      min-width: 240px;
      position: relative;
      overflow: hidden;
      border: none;
      background: rgba(25, 20, 35, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      /* pulse animation (subtle) */
      animation: gentlePulse 3s infinite ease-in-out;
    }

    .primary-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: linear-gradient(
        115deg,
        rgba(255, 255, 255, 0) 10%,
        rgba(255, 255, 255, 0.2) 30%,
        rgba(255, 255, 255, 0.4) 50%,
        rgba(255, 255, 255, 0.2) 70%,
        rgba(255, 255, 255, 0) 90%
      );
      transform: rotate(25deg) translateX(-100%) translateY(-30%);
      transition: transform 0.7s ease;
      pointer-events: none;
    }

    /* liquid hover effect */
    .primary-btn:hover::after {
      transform: rotate(25deg) translateX(10%) translateY(-10%);
    }

    .primary-btn:hover {
      background: rgba(50, 35, 70, 0.6);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 35px rgba(200, 160, 255, 0.6);
      transform: scale(1.02);
    }

    @keyframes gentlePulse {
      0% { box-shadow: 0 0 20px rgba(180, 130, 255, 0.3); }
      50% { box-shadow: 0 0 40px rgba(200, 150, 255, 0.6); }
      100% { box-shadow: 0 0 20px rgba(180, 130, 255, 0.3); }
    }

    /* loading / redirecting state */
    .status-area {
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(255, 240, 255, 0.9);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .proceed-link {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.9rem 2.4rem;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      letter-spacing: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      transition: 0.25s;
      display: inline-block;
    }

    .proceed-link:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
    }

    .meta-footer {
      font-size: 0.75rem;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-top: 2rem;
    }

    /* preloader (elegant, brief) */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0817;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease, visibility 0.8s;
      backdrop-filter: blur(10px);
    }
    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .preloader-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 200, 255, 0.15);
      border-top: 3px solid #c7a4ff;
      border-radius: 50%;
      animation: spin 1s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    .preloader-text {
      font-size: 1.2rem;
      letter-spacing: 6px;
      color: #b6a2d6;
      font-weight: 300;
    }

    /* hide preloader after loading */
    .loaded #preloader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* responsive adjustments */
    @media (max-width: 480px) {
      .glass-card { padding: 2rem 1.5rem; }
      .primary-btn { font-size: 1.1rem; letter-spacing: 4px; min-width: 200px; }
    }
  </style>
</head>
<body id="body">
  <!-- elegant preloader (brief) -->
  <div id="preloader">
    <div class="preloader-content">
      <div class="preloader-spinner"></div>
      <div class="preloader-text">tnxbd</div>
    </div>
  </div>

  <!-- three.js canvas container -->
  <div id="canvas-container"></div>

  <!-- main UI -->
  <div class="content">
    <div class="glass-card">
      <h1>TNXBD.TOP</h1>
      <div class="subtitle">a e s t h e t i c &nbsp; f l u i d i t y</div>

      <!-- dynamic button area -->
      <div class="button-wrapper" id="buttonWrapper">
        <button class="primary-btn" id="mainActionBtn">EXPLORE</button>
        <div class="status-area" id="statusArea" style="display: none;">
          <div class="spinner"></div>
          <span>redirecting ...</span>
        </div>
        <!-- proceed button (hidden initially) -->
        <div id="proceedContainer" style="display: none;">
          <a href="https://dist.tnxbd.top" class="proceed-link" target="_blank" rel="noopener">→ PROCEED TO DIST</a>
        </div>
      </div>

      <div class="meta-footer">✦ smooth gateway ✦</div>
    </div>
  </div>

  <!-- three.js + interaction (ultra-light, no extra libs) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    // --- Three.js interactive blob (abstract, fluid, mouse-aware) ---
    import * as THREE from 'three';

    // setup scene, camera, renderer (with alpha for gradient)
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    // no background — let body gradient show through
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap for performance
    container.appendChild(renderer.domElement);

    // --- lights (soft) ---
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const pointLight1 = new THREE.PointLight(0xaa88ff, 1, 8);
    pointLight1.position.set(2, 3, 4);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0x5f3b8c, 1.2, 8);
    pointLight2.position.set(-3, -1, 3);
    scene.add(pointLight2);

    // --- blob mesh with custom shader (reactive, wobbly) ---
    const geometry = new THREE.SphereGeometry(1.4, 64, 64); // smooth but not too heavy

    // uniforms: time + mouse
    const uniforms = {
      time: { value: 0 },
      mouse: { value: new THREE.Vector2(0.5, 0.5) },
      color1: { value: new THREE.Color(0x9f7aea) },
      color2: { value: new THREE.Color(0x4a2c5f) }
    };

    // vertex shader: displacement along normal using sin/cos + mouse influence
    const vertexShader = `
      varying float vDistort;
      varying vec3 vNormal;
      varying vec3 vPosition;
      uniform float time;
      uniform vec2 mouse;

      void main() {
        // basic wave distortion using position + time
        float t = time * 1.2;
        float distort = sin(position.x * 2.5 + t) * cos(position.y * 2.0 + t * 0.8) * sin(position.z * 2.2 + t * 1.1);
        // mouse adds extra distortion (based on angle, simplified)
        float mouseFactor = (mouse.x - 0.5) * 1.5; // -0.75 .. 0.75
        distort += mouseFactor * sin(position.y * 4.0 + time * 2.0) * 0.4;
        distort *= 0.35; // intensity

        vec3 displaced = position + normal * distort;
        vDistort = distort;
        vNormal = normal;
        vPosition = displaced;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
      }
    `;

    const fragmentShader = `
      varying float vDistort;
      varying vec3 vNormal;
      varying vec3 vPosition;
      uniform vec3 color1;
      uniform vec3 color2;
      uniform float time;

      void main() {
        // soft gradient based on distortion and normals
        float mixVal = (vDistort * 1.5 + 0.5) + sin(vPosition.x * 2.0 + time) * 0.1;
        vec3 baseColor = mix(color1, color2, mixVal);
        // add subtle iridescence
        float glow = 0.5 + 0.5 * sin(vPosition.y * 8.0 + time * 2.0);
        vec3 finalColor = mix(baseColor, vec3(0.9, 0.7, 1.0), glow * 0.2);
        // transparency to let gradient breathe
        gl_FragColor = vec4(finalColor, 0.65);
      }
    `;

    const material = new THREE.ShaderMaterial({
      uniforms: uniforms,
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      transparent: true,
      wireframe: false,
      side: THREE.DoubleSide,
      blending: THREE.NormalBlending
    });

    const blob = new THREE.Mesh(geometry, material);
    scene.add(blob);

    // subtle rotation so it's not static
    blob.rotation.x = 0.2;
    blob.rotation.y = 0.5;

    // mouse tracking (normalized)
    const mouse = new THREE.Vector2(0.5, 0.5);
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX / window.innerWidth;
      mouse.y = e.clientY / window.innerHeight;
      // update uniform
      uniforms.mouse.value.set(mouse.x, mouse.y);
      
      // also rotate blob slightly with mouse (makes it reactive)
      blob.rotation.y = 0.5 + (mouse.x - 0.5) * 0.8;
      blob.rotation.x = 0.2 + (mouse.y - 0.5) * 0.4;
    });

    // resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // animation loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      uniforms.time.value += delta;

      renderer.render(scene, camera);
    }
    animate();

    // --- Preloader removal (brief loading) ---
    window.addEventListener('load', () => {
      // after everything loaded, add class to fade preloader
      setTimeout(() => {
        document.body.classList.add('loaded');
      }, 800); // keep it elegant, not too short
    });

    // --- Gateway logic (Enter → Redirecting → Proceed) ---
    const exploreBtn = document.getElementById('mainActionBtn');
    const statusArea = document.getElementById('statusArea');
    const proceedContainer = document.getElementById('proceedContainer');
    const buttonWrapper = document.getElementById('buttonWrapper');

    exploreBtn.addEventListener('click', (e) => {
      e.preventDefault();
      
      // hide explore button, show redirecting status
      exploreBtn.style.display = 'none';
      statusArea.style.display = 'flex';

      // after 1.8s (elegant pause), hide status and show proceed button
      setTimeout(() => {
        statusArea.style.display = 'none';
        proceedContainer.style.display = 'block';
        // optional: add small fade for proceed
        proceedContainer.style.animation = 'fadeUp 0.5s ease forwards';
      }, 1800);
    });

    // optional: if user wants to see original button again? not needed, but we can add a tiny reset? no — matches spec.

    // tiny performance: disable right click context for cleaner look? (optional)
    window.addEventListener('contextmenu', e => e.preventDefault());
  </script>

  <!-- fallback for very old browsers: no three, but still works -->
  <noscript>
    <div style="position:fixed; bottom:20px; color:white;">enable JS for full experience</div>
  </noscript>
</body>
</html>
